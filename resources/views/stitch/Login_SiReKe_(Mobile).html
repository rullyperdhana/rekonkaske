<body class="text-on-background flex flex-col items-center justify-center min-h-screen p-margin-mobile">

<!-- Main Login Canvas -->

<!-- Header Branding (Institutional Style) -->

<div class="mb-6 float-animation">
<!-- Kabupaten Tapin Logo Placeholder -->

<p class="font-label-sm text-label-sm text-on-surface-variant tracking-[0.2em] uppercase">
                Sistem Rekonsiliasi SIPANDA
            </p>
<div class="w-16 h-1 mt-4 bg-primary rounded-full"></div>
</header>
<!-- Login Form Container (Paper Surface) -->
<div class="w-full paper-container rounded-xl shadow-sm px-8 py-10">
<div class="mb-8">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-1 text-center">Selamat Datang</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center">Silakan masuk ke akun BAPENDA Anda</p>
</div>
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- NIP / User Input -->
<div class="space-y-2">
<label class="font-body-md font-bold text-on-surface" for="username">NIP atau Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">
                            person
                        </span>
<input class="w-full h-[48px] pl-11 pr-4 bg-surface-container-low border border-outline-variant rounded-lg font-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" id="username" name="username" placeholder="Masukkan NIP Anda" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-body-md font-bold text-on-surface" for="password">Password</label>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">
                            lock
                        </span>
<input class="w-full h-[48px] pl-11 pr-11 bg-surface-container-low border border-outline-variant rounded-lg font-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" id="togglePassword">visibility</span>
</button>
</div>
</div>

</label>

</div>

<span class="material-symbols-outlined text-[18px]">security</span>

<script>
        // Simple Interaction Logic
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });

        // Form submission feedback
        document.querySelector('form').addEventListener('submit', function(e) {
            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Menghubungkan...
            `;
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');

            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
                alert('Informasi Login: Versi Mobile SiReKe telah siap. Silakan integrasikan backend Anda.');
            }, 1500);
        });
    </script>
