<body class="bg-surface font-body-md text-on-surface">
<!-- Top AppBar (Mobile Style) -->
<header class="fixed top-0 left-0 right-0 h-16 bg-surface-container-lowest border-b-2 border-primary flex items-center px-4 z-40">
<button class="p-2 -ml-2 text-primary active:opacity-60 transition-opacity">

</button>
<div class="ml-2 flex flex-col">
<h1 class="text-headline-sm font-headline-sm text-primary leading-tight">Transaksi</h1>
<span class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Input Data Baru</span>
</div>
<div class="ml-auto flex gap-2">
<button class="p-2 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-20 pb-24 px-4 max-w-lg mx-auto min-h-screen">
<!-- Multi-Step Indicator -->
<div class="flex items-center justify-between mb-8 px-4">
<div class="flex flex-col items-center gap-1">
<div class="w-8 h-8 rounded-full border-2 flex items-center justify-center step-complete font-bold bg-secondary-container">
<span class="material-symbols-outlined text-sm" data-icon="check" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<span class="text-label-sm font-label-sm text-secondary">Identitas</span>
</div>
<div class="h-0.5 flex-1 bg-secondary mx-2 -mt-5"></div>
<div class="flex flex-col items-center gap-1">
<div class="w-8 h-8 rounded-full border-2 flex items-center justify-center step-active font-bold">
                    2
                </div>
<span class="text-label-sm font-label-sm text-primary">Data BKU</span>
</div>
<div class="h-0.5 flex-1 bg-outline-variant mx-2 -mt-5"></div>
<div class="flex flex-col items-center gap-1">
<div class="w-8 h-8 rounded-full border-2 flex items-center justify-center step-inactive font-bold">
                    3
                </div>
<span class="text-label-sm font-label-sm text-on-surface-variant">Bank</span>
</div>
</div>
<!-- Form Card Section -->
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-6 shadow-sm animate-fade-in">
<div class="mb-6">
<h2 class="text-headline-sm font-headline-sm text-primary mb-1">Rincian BKU</h2>
<p class="text-body-md text-on-surface-variant">Masukkan rincian Buku Kas Umum sesuai dokumen fisik.</p>
</div>
<form class="space-y-5">
<!-- Field: Tanggal Transaksi -->
<div>
<label class="block text-body-md font-bold text-on-surface mb-2">Tanggal Transaksi</label>
<div class="relative">
<input class="w-full h-11 px-4 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" type="date"/>
</div>
</div>
<!-- Field: Nomor Bukti -->
<div>
<label class="block text-body-md font-bold text-on-surface mb-2">Nomor Bukti</label>
<input class="w-full h-11 px-4 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="Contoh: 001/BKU/2023" type="text"/>
</div>
<!-- Field: Uraian -->
<div>
<label class="block text-body-md font-bold text-on-surface mb-2">Uraian Transaksi</label>
<textarea class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="Ketik keterangan transaksi di sini..." rows="3"></textarea>
</div>
<!-- Field: Nominal -->
<div>
<label class="block text-body-md font-bold text-on-surface mb-2">Nominal (Rp)</label>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-data-tabular">Rp</div>
<input class="w-full h-11 pl-12 pr-4 bg-surface-container-low border border-outline-variant rounded-lg font-data-tabular text-headline-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="0" type="number"/>
</div>
</div>
<!-- Field: Bukti Fisik Upload -->
<div>
<label class="block text-body-md font-bold text-on-surface mb-2">Bukti Pendukung</label>
<div class="grid grid-cols-2 gap-3">
<button class="flex flex-col items-center justify-center p-4 border-2 border-dashed border-outline-variant rounded-xl bg-surface-container hover:bg-surface-container-high transition-colors active:scale-95" type="button">
<span class="material-symbols-outlined text-primary mb-1" data-icon="photo_camera" style="font-size: 28px;">photo_camera</span>
<span class="text-label-sm font-label-sm text-primary">Kamera</span>
</button>
<button class="flex flex-col items-center justify-center p-4 border-2 border-dashed border-outline-variant rounded-xl bg-surface-container hover:bg-surface-container-high transition-colors active:scale-95" type="button">
<span class="material-symbols-outlined text-primary mb-1" data-icon="upload_file" style="font-size: 28px;">upload_file</span>
<span class="text-label-sm font-label-sm text-primary">Unggah File</span>
</button>
</div>
<p class="mt-2 text-[10px] text-on-surface-variant italic">* Maksimal file 5MB (JPG, PNG, PDF)</p>
</div>
</form>
</div>
<!-- Action Buttons -->
<div class="mt-8 flex gap-3">
<button class="flex-1 h-12 border-2 border-primary text-primary rounded-xl font-bold active:bg-primary/10 transition-colors">

<button class="flex-1 h-12 bg-primary text-on-primary rounded-xl font-bold shadow-lg shadow-primary/20 active:scale-95 transition-transform flex items-center justify-center gap-2">

<p class="text-label-sm font-label-sm text-primary-container">

            </p>

</button>
<button class="flex flex-col items-center justify-center w-full h-full text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="text-[10px] font-label-sm">Pengaturan</span>
</button>
</nav>

<div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-0 right-0 w-64 h-64 bg-primary/5 rounded-full blur-3xl -mr-32 -mt-32"></div>
<div class="absolute bottom-0 left-0 w-80 h-80 bg-secondary/5 rounded-full blur-3xl -ml-40 -mb-40"></div>
</div>
<script>
        // Simple micro-interaction for numeric input formatting (placeholder logic)
        const nominalInput = document.querySelector('input[type="number"]');
        if (nominalInput) {
            nominalInput.addEventListener('focus', () => {
                nominalInput.parentElement.classList.add('scale-[1.02]');
            });
            nominalInput.addEventListener('blur', () => {
                nominalInput.parentElement.classList.remove('scale-[1.02]');
            });
        }
